<!DOCTYPE html>
<html>
<head>
    <title>Customer List</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            /* BANK BACKGROUND */
            background-image: url("https://images.unsplash.com/photo-1554224155-1696413565d3?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* DARK OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: -1;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(30, 58, 138, 0.95);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .navbar a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* CONTAINER */
        .container {
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* TITLE */
        h2 {
            color: white;
        }

        /* TABLE BOX (GLASS EFFECT) */
        .table-box {
            background: rgba(255,255,255,0.92);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th {
            background: #1e3a8a;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f5ff;
        }

        /* BUTTONS */
        .btn {
            padding: 6px 10px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-size: 12px;
            margin: 2px;
            display: inline-block;
        }

        .deposit { background: #16a34a; }
        .withdraw { background: #dc2626; }
        .transfer { background: #f59e0b; }
        .edit { background: #2563eb; }
        .delete { background: #111827; }
        .pdf { background: #7c3aed; }

        .btn:hover {
            opacity: 0.85;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>Union Bank</b></div>

    <div>
        <a href="{% url 'dashboard' %}">Home</a>
        <a href="{% url 'customer_list' %}">Customers</a>
        <a href="{% url 'add_customer' %}">Add Customer</a>

        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'signup' %}">Signup</a>
        {% endif %}
    </div>
</div>

<div class="container">

    <h2>Customer List</h2>

    <div class="table-box">

        <table>
            <tr>
                <th>Name</th>
                <th>Account</th>
                <th>Balance</th>
                <th>Actions</th>
            </tr>

            {% for c in customers %}
            <tr>
                <td>{{ c.name }}</td>
                <td>{{ c.account_number }}</td>
                <td>₹ {{ c.balance }}</td>

                <td>
                    <a class="btn deposit" href="{% url 'deposit' c.id %}">Deposit</a>
                    <a class="btn withdraw" href="{% url 'withdraw' c.id %}">Withdraw</a>
                    <a class="btn transfer" href="{% url 'transfer' c.id %}">Transfer</a>
                    <a class="btn edit" href="{% url 'edit_customer' c.id %}">Edit</a>
                    <a class="btn delete" href="{% url 'delete_customer' c.id %}"
                       onclick="return confirm('Delete this customer?')">Delete</a>
                    <a class="btn pdf" href="{% url 'download_statement' c.id %}">PDF</a>
                    

                </td>
            </tr>
            {% endfor %}

          

        </table>

    </div>

</div>

</body>
</html>
