<!DOCTYPE html>
<html>
<head>
    <title>Login - UNION BANK</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;

            /* FIXED BANK BACKGROUND */
            background-image: url("https://images.unsplash.com/photo-1554224155-1696413565d3?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* DARK OVERLAY */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
        }

        /* LOGIN BOX */
        .login-box {
            position: relative;
            z-index: 2;

            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 12px;
            width: 320px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
        }

        .login-box h2 {
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .error {
            color: red;
            font-size: 13px;
        }

        .link {
            margin-top: 10px;
            font-size: 13px;
        }

        .link a {
            color: #1e3a8a;
            font-weight: bold;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">

    <h2>🏦 Bank Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account?
        <a href="{% url 'signup' %}">Signup</a>
    </div>

</div>

</body>
</html>
