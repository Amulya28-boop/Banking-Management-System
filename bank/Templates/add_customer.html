<!DOCTYPE html>
<html>
<head>
    <title>Add Customer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            /* BANK BACKGROUND */
            background-image: url("https://images.unsplash.com/photo-1554224155-1696413565d3?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* DARK OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: -1;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(30, 58, 138, 0.95);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* CONTAINER */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }

        /* FORM CARD */
        .form-box {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .form-box h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #15803d;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>Union Bank</b></div>

    <div>
        <a href="{% url 'dashboard' %}">Home</a>
        <a href="{% url 'customer_list' %}">Customers</a>
        <a href="{% url 'add_customer' %}">Add Customer</a>

        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'signup' %}">Signup</a>
        {% endif %}
    </div>
</div>

<!-- FORM -->
<div class="container">

    <div class="form-box">

        <h2>Add Customer</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" placeholder="Customer Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="phone" placeholder="Phone" required>
            <input type="text" name="account_number" placeholder="Account Number" required>
            <input type="number" name="balance" placeholder="Initial Balance" required>

            <button type="submit">Add Customer</button>
        </form>

    </div>

</div>

</body>
</html>
