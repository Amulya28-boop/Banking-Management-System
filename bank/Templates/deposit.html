<!DOCTYPE html>
<html>
<head>
    <title>Deposit Money</title>

    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:450px;
            margin:50px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:green;
        }

        p{
            font-size:18px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

        a{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Deposit Money</h2>

<p><strong>Customer:</strong> {{ customer.name }}</p>
<p><strong>Account No:</strong> {{ customer.account_number }}</p>
<p><strong>Current Balance:</strong> ₹ {{ customer.balance }}</p>

<form method="POST">

{% csrf_token %}

<label>Deposit Amount</label>

<input
type="number"
name="amount"
step="0.01"
min="1"
required>

<button type="submit">
Deposit
</button>

</form>

<a href="{% url 'customer_list' %}">
Back to Customer List
</a>

</div>

</body>
</html>
